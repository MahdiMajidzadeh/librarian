name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    # Xcode 26.x / Swift 6.x toolchain (project needs tools-version 6.0+)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

      - name: Build Librarian.app
        run: Scripts/make-app.sh dist

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" dist/Librarian.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" dist/Librarian.app/Contents/Info.plist

      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - dist/Librarian.app

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="$(mktemp -d)"
          cp -R dist/Librarian.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Librarian" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "Librarian-$VERSION.dmg"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Librarian $VERSION" \
            --generate-notes \
            "Librarian-$VERSION.dmg"
